name: Site health monitor

# Checks the LIVE production site (no Search Console login needed):
# sitemap reachability, every URL returns 200, TLS cert expiry, and JSON-LD
# structured data on key pages. A red run emails the repo owner automatically.

on:
  schedule:
    - cron: '17 * * * *' # hourly at :17 (live app — catch outages within the hour)
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run live-site health checks
        working-directory: web
        run: node scripts/monitor.mjs --url https://pourpicks.app
