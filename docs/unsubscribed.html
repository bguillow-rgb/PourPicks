<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribed - Pour Picks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0F0B09;
      color: #EDE4D3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #241914;
      border: 1px solid rgba(176,141,87,0.25);
      border-radius: 12px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .wordmark {
      font-size: 11px;
      letter-spacing: 4px;
      color: #B08D57;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(176,141,87,0.3);
      margin: 24px auto;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 26px;
      font-weight: 500;
      color: #EDE4D3;
      margin-bottom: 12px;
    }
    p { color: #A89B82; font-size: 15px; line-height: 1.65; }
    a { color: #B08D57; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">POUR PICKS</div>
    <div class="divider"></div>
    <h1>You've been unsubscribed.</h1>
    <div class="divider"></div>
    <p>
      We won't send you any more emails. Thanks for being part of the community.
      <br><br>
      If you ever want back in, the app is always at <a href="https://pourpicks.app">pourpicks.app</a>.
    </p>
  </div>
</body>
</html>
